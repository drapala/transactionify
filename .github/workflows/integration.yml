name: integration
'on':
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install uv
        run: pipx install uv
      - name: install deps (pnpm)
        run: pnpm install --frozen-lockfile
      - name: install deps (uv)
        run: uv sync --all-packages
      - name: package (RuntimeAdapter.packageCommand)
        run: sh -c npx cdk synth --quiet && tar -czf service-package.tgz cdk.out/
      - name: upload service-package artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-package
          path: service-package.tgz
          if-no-files-found: error
  attest:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: download service-package artifact
        uses: actions/download-artifact@v4
        with:
          name: service-package
          path: ./artifact
      - name: attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ./artifact/*
  deploy-staging:
    runs-on: ubuntu-latest
    needs:
      - attest
    environment: staging
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: install deps
        run: pnpm install --frozen-lockfile
      - name: deploy-staging (synth-only at PoC fidelity)
        run: >-
          npx cdk synth --context account=000000000000 --context region=us-east-1 --quiet && echo 'synth ok — real
          deploy requires OIDC (ADR Future Integrations)'
  deploy-prod:
    runs-on: ubuntu-latest
    needs:
      - deploy-staging
    environment: production
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - name: install deps
        run: pnpm install --frozen-lockfile
      - name: deploy-prod (synth-only at PoC fidelity)
        run: >-
          npx cdk synth --context account=111111111111 --context region=us-east-1 --quiet && echo 'synth ok — real
          deploy requires OIDC (ADR Future Integrations)'
  dora-emit:
    runs-on: ubuntu-latest
    needs:
      - deploy-prod
    if: always()
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: emit DORA event
        run: >-
          set -euo pipefail

          EVENT_ID=$(python3 -c 'import
          os,time;ts=int(time.time()*1000);b=os.urandom(10);v7=(ts<<80)|(7<<76)|((b[0]&0x0f)<<72)|(b[1]<<64)|((b[2]&0x3f|0x80)<<56)|(int.from_bytes(b[3:10],"big"));h=v7.to_bytes(16,"big").hex();print(f"{h[0:8]}-{h[8:12]}-{h[12:16]}-{h[16:20]}-{h[20:32]}")')

          OUTCOME="${{ needs.deploy-prod.result == 'success' && 'success' || 'failure' }}"

          STARTED_AT="${{ github.event.repository.updated_at }}"

          FINISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          WORK_ID=$(printf "%s" "$RAW_TITLE" | grep -oE "(LL|GP)-[0-9]+" | head -1 || echo "GP-0")

          CHANGE_SUMMARY=$(printf "%s" "$RAW_TITLE" | head -c 240)

          COMMIT_AUTHORED_AT="$(git show -s --format=%aI ${{ github.sha }})"

          mkdir -p dora-events

          cat > dora-events/event.json <<JSON

          {
            "event_id": "$EVENT_ID",
            "schema_version": "1.0.0",
            "event_type": "deployment",
            "service": "transactionify",
            "repository": "${{ github.repository }}",
            "commit_sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "work_id": "$WORK_ID",
            "change_summary": "$CHANGE_SUMMARY",
            "outcome": "$OUTCOME",
            "started_at": "$STARTED_AT",
            "finished_at": "$FINISHED_AT",
            "source": "ci",
            "run_id": "${{ github.run_id }}",
            "source_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "commit_authored_at": "$COMMIT_AUTHORED_AT",
            "is_rework": false
          }

          JSON

          python3 -m pip install --quiet jsonschema

          python3 -c 'import json,sys;from jsonschema import
          Draft202012Validator;e=json.load(open("dora-events/event.json"));s=json.load(open("packages/shared-schemas/dora-event.schema.json"));errs=list(Draft202012Validator(s).iter_errors(e));sys.exit(0
          if not errs else (print(errs[0].message),1)[1])'
        env:
          RAW_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
      - name: upload dora-events
        uses: actions/upload-artifact@v4
        with:
          name: dora-events
          path: dora-events/
