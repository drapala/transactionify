[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# pythonpath needs BOTH paths simultaneously:
#   ../../../../        → repo root, so existing tests can `from src.python.transactionify...`
#   ../../../../src/python → so production modules' inner imports
#                            (`from transactionify.tools.aws.dynamodb import …`) resolve.
# Setting only one breaks the other (P0-1 audit fix).
pythonpath = ../../../../ ../../../../src/python
addopts = -v --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    pbt: Property-based tests (Hypothesis-driven). Run via `pytest -m pbt`; unit job runs `pytest -m 'not pbt'`.
