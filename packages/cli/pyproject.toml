[project]
name = "dx"
version = "0.0.1"
description = "dx — developer-facing CLI for the Golden Path platform (scaffold; real surface lands in GP-002)"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
dx = "dx.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dx"]
