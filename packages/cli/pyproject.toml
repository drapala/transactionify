[project]
name = "dx"
version = "0.1.0"
description = "dx — developer-facing CLI for the Golden Path platform (Typer + Rich; --json on every command)"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "rich>=13.7",
    "pyyaml>=6.0",
    "jsonschema>=4.21",
    "jinja2>=3.1",
]

[project.scripts]
dx = "dx.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dx"]

[tool.hatch.build.targets.wheel.force-include]
"src/dx/templates" = "dx/templates"
