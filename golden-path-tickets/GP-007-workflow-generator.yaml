id: GP-007
title: "PR/integration workflow generator â€” stages + Q + DORA + attestation"
tier: A
delegate: pipeline
delegate_reason: "Well-bounded function: input plan â†’ output YAML. AC = snapshot match + actionlint pass."
review_mode: pre_pr_review
blast_radius: high
stretch: false

depends_on:
  - GP-001
  - GP-004
  - GP-005
  - GP-006

paths:
  primary: packages/framework/src/workflows/pr-pipeline.ts
  secondary:
    - packages/framework/src/workflows/integration-pipeline.ts
    - packages/framework/src/workflows/steps/lint.ts
    - packages/framework/src/workflows/steps/unit-tests.ts
    - packages/framework/src/workflows/steps/pbt.ts
    - packages/framework/src/workflows/steps/contract.ts
    - packages/framework/src/workflows/steps/cdk-synth.ts
    - packages/framework/src/workflows/steps/ai-review.ts
    - packages/framework/src/workflows/steps/dora-emit.ts
    - packages/framework/src/workflows/steps/attestation.ts
    - packages/framework/src/workflows/steps/build.ts                        # NEW: build job that produces the artifact attestation references
    - packages/framework/src/generated/check-manifest.json                   # generated by GP-004's codegen-manifest script; consumed here for cross-import enforcement
  test:
    - packages/framework/test/workflows/pr-pipeline.test.ts
    - packages/framework/test/workflows/integration-pipeline.test.ts
    - packages/framework/test/workflows/test_workflow_uses_manifest.test.ts  # cross-import: framework reads from check-manifest.json (single source of truth)
    - packages/framework/test/workflows/test_integration_build_job.test.ts   # NEW: asserts attest job's subject-path resolves to a real artifact produced by build job
    - packages/framework/test/fixtures/expected-pr-pipeline.yml
    - packages/framework/test/fixtures/expected-integration-pipeline.yml

gherkin:
  - scenario: "PR pipeline encodes ordering via job needs: edges (jobs are a map, not an array)"
    given:
      - "an adapter (e.g. PythonAdapter) and a DxConfig"
    when:
      - "generatePrPipeline(adapter, config) is called and the result is rendered"
    then:
      - "the workflow `jobs` field is a YAML map; the generator does NOT rely on key ordering for execution order"
      - "needs: edges: unit-tests needs [lint]; pbt needs [unit-tests]; contract needs [pbt]; work-id-pr-title needs [lint]; ai-review needs [contract] (early non-blocking AI feedback, parallel to cdk-synth); cdk-synth needs [contract]; sandbox-verify needs [cdk-synth, work-id-pr-title] (BOTH gates close before sandbox verification); dora-emit needs [sandbox-verify] AND has `if: always()` so the event emits even on upstream failure (outcome field reflects success or failure)"
      - "lint, unit-tests, pbt, contract, work-id-pr-title, cdk-synth, sandbox-verify jobs have no continue-on-error (failure blocks downstream via needs)"
      - "unit-tests, pbt, contract, cdk-synth, sandbox-verify jobs all set `env: AWS_DEFAULT_REGION: us-east-1` at job-level (P0-1 â€” the fork's tools/aws/dynamodb/__init__.py creates a boto3 resource at module-import time; without AWS_DEFAULT_REGION pytest fails on import with NoRegionError before any test runs). The env var is declared at job level (not step level) so every step within those jobs inherits it â€” including any `actions/setup-python` install step that imports the project's modules indirectly"
      - "ai-review has continue-on-error: true (Q runs early â€” right after contract checks â€” for fast feedback; non-blocking by design so it never blocks deploy)"
      - "sandbox-verify is a SYNTH-ONLY job (not a real cdk deploy) for PoC scope: it runs `pnpm cdk synth --context account=<sandbox-account-id-stub> --context region=us-east-1` and asserts cdk.out/ has produced the expected stack templates. NO AWS credentials are required at PoC fidelity. The PDF says 'only the PR Pipeline implementation is required' and the conceptual sandbox stage is satisfied by validating that synthesis would work; the actual cloud deploy is the ADR Future Integrations evolution path (requires OIDC + sandbox AWS account, ~1d of plumbing the candidate intentionally did not build for the PoC)."
      - "PR pipeline owns sandbox-verify (synth-only) per PDF Stages list at PoC fidelity; staging and production deploys are owned by the integration pipeline (still synth-validated at PoC; real cloud deploys gated on OIDC + per-environment AWS roles, marked as evolution path)"
      - "test asserts the topological order derived from needs: lint â†’ {work-id-pr-title || unit-tests} â†’ pbt â†’ contract â†’ {ai-review || cdk-synth (parallel)} â†’ sandbox-verify (gated by both cdk-synth AND work-id-pr-title) â†’ dora-emit (always)"

  - scenario: "PR title work_id check pulls from GitHub event payload"
    given:
      - "the work-id-pr-title job in the generated PR workflow"
    when:
      - "the job runs on pull_request event"
    then:
      - "the step reads the PR title from `${{ github.event.pull_request.title }}`"
      - "applies the same regex as `dx check work_id` (single source of truth via CHECK_MANIFEST)"
      - "non-matching title fails the job with an actionable error and a link to the convention doc"
      - "this closes the third leg of the PDF's Work ID requirement (branch + commits via dx check; PR title in CI)"

  - scenario: "AI review step uses Amazon Q via GitHub App (comment-trigger), not a fictional action"
    given:
      - "Amazon Q Developer for GitHub is installed as a GitHub App on the repo (consumer-side)"
      - "vars.AMAZON_Q_REVIEW_ENABLED is set to 'true' in repo Actions variables"
    when:
      - "the ai-review step is inspected"
    then:
      - "step name explicitly contains 'AI review (Amazon Q via GitHub App, non-blocking)'"
      - "the ai-review JOB declares explicit permissions: contents: read, pull-requests: write, issues: write â€” without these the default GITHUB_TOKEN is read-only and `gh pr comment` returns 403 at runtime, regardless of whether the Q App is installed. This is the load-bearing detail the comment-trigger model depends on; missing it makes the entire ai-review path silently broken"
      - "the JOB has continue-on-error: true (Q runs early â€” right after contract checks â€” for fast feedback; non-blocking by design so it never blocks deploy)"
      - "step's run command posts '/q review' as a PR comment via `gh pr comment ${{ github.event.pull_request.number }} --body '/q review'` (using GITHUB_TOKEN which the workflow-level permissions just enabled), NOT a `uses: amazon-q-developer/*` reference (no such action exists publicly)"
      - "step is gated on `${{ vars.AMAZON_Q_REVIEW_ENABLED == 'true' }}` so it no-ops when the consumer has not enabled the integration"
      - "consumer is responsible for: (a) installing the Q Developer GitHub App on the target repo's owner; (b) granting the App access to THIS specific repo (owner-level installation does not auto-grant per-repo access â€” installation can be 'all repos' or 'selected repos'); (c) setting `AMAZON_Q_REVIEW_ENABLED=true` as a repo Actions variable. GP-009c preflight verifies all three before governance applies."

  - scenario: "Workflow imports check commands from CLI's CHECK_MANIFEST via generated JSON (real cross-import, not hardcoded copy)"
    given:
      - "GP-004 owns CHECK_MANIFEST in packages/cli/src/dx/checks/manifest.py AND ships a codegen-manifest script that emits packages/framework/src/generated/check-manifest.json"
      - "the framework's workflow generator imports check-manifest.json statically (TypeScript JSON import); it does NOT maintain a parallel hardcoded copy of commands"
    when:
      - "test_workflow_uses_manifest.test.ts runs"
    then:
      - "the test loads packages/framework/src/generated/check-manifest.json AND inspects the generated PR pipeline fixture"
      - "for each key in {lint, unit_tests, pbt, contract, work_id}: the step's run command in the generated YAML matches the cmd+args from check-manifest.json byte-for-byte"
      - "if the framework hardcodes a command that diverges from check-manifest.json, the test fails with a clear diff"
      - "additionally: a CI check runs `python -m dx.checks.manifest_codegen` (the GP-004 script), then `git diff --exit-code packages/framework/src/generated/check-manifest.json` â€” if the generated file is stale relative to the Python source, CI fails. This makes the codegen non-optional and prevents the manifest from drifting via stale TS copy"

  - scenario: "DORA event artifact emits raw events with the FULL audit field set (not just the convenient subset)"
    given:
      - "GP-001's schema models raw facts and v1 enum is: pipeline_run | deployment (incident_* are NOT in v1)"
      - "GP-001 makes REQUIRED on every event: schema_version, event_type, service, repository, commit_sha, actor, work_id, change_summary, outcome, started_at, finished_at"
      - "GP-001 conditionally requires: run_id + source_url for source: ci events; commit_authored_at for deployment events"
    when:
      - "the dora-emit step is inspected"
    then:
      - "step writes a JSONL where each line includes the full required field set above (event_id is required on every event â€” generated at emission time)"
      - "field-to-source mapping the agent must implement: event_id generated via `python -c 'import uuid_utils; print(uuid_utils.uuid7())'` OR fallback to a Python helper from packages/cli (UUIDv7 generator already exists in the fork's `tools/generators/uuid.py` â€” reuse it, do not reinvent), schema_version='1.0', event_type='pipeline_run' for PR pipeline / 'deployment' for integration pipeline, service from .dx.yaml.project, repository from ${{ github.repository }}, commit_sha from ${{ github.sha }}, actor from ${{ github.actor }}, work_id extracted from PR title via CHECK_MANIFEST.work_id.extract_pattern (PR pipeline) or from latest commit subject via the same regex (integration pipeline), change_summary from PR title (PR pipeline) or from `${{ github.event.head_commit.message }}` truncated (integration pipeline), outcome from job-status of preceding sandbox-verify (PR pipeline) or deploy-prod (integration pipeline), started_at from workflow start time, finished_at from emission time, run_id from ${{ github.run_id }}, source_url constructed as ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}, commit_authored_at (deployment events only) from `git show -s --format=%aI ${{ github.sha }}` at emission time"
      - "PR pipeline emits one pipeline_run event per run (event_type='pipeline_run', outcome reflects sandbox-verify result)"
      - "integration pipeline emits one deployment event per run (event_type='deployment', outcome reflects deploy-prod result, commit_authored_at populated from git, is_rework=false by default â€” the rework detection logic is consumer-side in GP-013 based on whether deploy-prod succeeded after a prior failure on the same branch)"
      - "the step does NOT compute or emit aggregate fields like deployment_frequency_per_week or change_fail_rate â€” those are downstream (GP-013)"
      - "step uploads the JSONL as artifact 'dora-events'"
      - "every emitted event passes validation against GP-001's schema (no exceptions; if validation fails the dora-emit step exits non-zero and the workflow run records the failure rather than emitting a malformed event). Validation includes event_id format check (UUIDv7) and conditional commit_authored_at presence on deployment events."

  - scenario: "Integration pipeline owns staging + production promotion AND defines the build job that attestation references"
    given:
      - "generateIntegrationPipeline(adapter, config) is called"
    when:
      - "the resulting YAML is inspected"
    then:
      - "trigger is push to main + workflow_dispatch"
      - "the integration pipeline declares jobs: build, attest, deploy-staging, deploy-prod, dora-emit (build is mandatory â€” without it the attest action has no subject and fails at runtime)"
      - "build job runs `<adapter>.packageCommand()` (e.g. `uv build` for Python via PythonAdapter), uploads the produced artifact via `actions/upload-artifact@v4` with a deterministic name (e.g. `service-package`), and exposes the artifact path as a step output"
      - "needs: edges encode order: attest needs [build]; deploy-staging needs [attest]; deploy-prod needs [deploy-staging]; dora-emit needs [deploy-prod]"
      - "deploy-staging and deploy-prod use environments with manual approval (`environment: staging`, `environment: production` with required reviewers); at PoC fidelity these jobs are synth-only against context-stub account IDs (same pattern as PR sandbox-verify) â€” real cloud deploy is gated on OIDC + per-environment AWS roles, marked as evolution path in the ADR. The structural difference between PR and integration pipelines is preserved (PR = validation + sandbox-synth; integration = build + attest + staging-synth + prod-synth + dora) so the workflow shape is the production-true shape, only the deploy steps are synth-instead-of-deploy"
      - "the integration pipeline does NOT redo sandbox-verify â€” the PR pipeline already exercised that surface; integration owns promotion only"
      - "the design boundary (PR = lint/unit/PBT/contract/cdk-synth/sandbox-verify + non-blocking AI review; integration = build â†’ attest â†’ staging â†’ prod promotion with manual approval) is documented in the ADR. AT POC FIDELITY all deploy-* jobs are synth-only; this is acknowledged honestly in ADR Consequences rather than hidden behind red CI"

  - scenario: "Attestation job declares required permissions AND subject-path resolves to the build artifact"
    given:
      - "the attest job in the integration pipeline"
    when:
      - "its YAML is inspected"
    then:
      - "the attest job declares permissions: id-token: write, attestations: write, contents: read"
      - "attest job uses `actions/attest-build-provenance@v1` (or current major) with explicit `subject-path` pointing to the artifact produced by the `build` job (downloaded via `actions/download-artifact@v4` in a prior step of the same job, or referenced by the artifact name pattern)"
      - "the test_integration_build_job.test.ts asserts: (a) the build job exists; (b) it uploads an artifact; (c) the attest job's subject-path or subject-name references that exact artifact name; (d) attest job's needs: includes 'build'"
      - "without these permissions OR without a build job whose artifact resolves, the action fails at runtime â€” earlier draft attest-without-build fixtures passed locally but would have exploded in real CI with 'subject-path: file not found'"

  - scenario: "Generated YAML matches snapshot fixture"
    given:
      - "expected-pr-pipeline.yml fixture committed in test/fixtures/"
    when:
      - "test runs the generator against a canonical config"
    then:
      - "the generated YAML is byte-equal to the fixture"
      - "if it diverges, the test fails with a clear diff"
      - "actionlint validates both fixtures successfully"

out_of_scope:
  - "Branch protection (GP-008 owns rulesets)"
  - "Auto-merge configuration (out of PoC scope)"
  - "Workflow dispatch with custom inputs"
  - "Replacing transactionify's existing CDK constructs"
  - "Implementing the Amazon Q GitHub App itself â€” only the comment-trigger step that integrates with it"
  - "Computing aggregate DORA metrics inside the workflow â€” events only; aggregation is downstream consumer territory"

validation_commands:
  - "pnpm --filter @golden-path/framework test packages/framework/test/workflows/"
  - "pnpm --filter @golden-path/framework run gen-fixtures && git diff --exit-code packages/framework/test/fixtures/"
  - "if command -v actionlint; then actionlint packages/framework/test/fixtures/*.yml; else echo 'actionlint not installed; skipped'; fi  # if-then-else â€” does NOT mask actionlint failures"
  # F13 â€” scoped grep: assert continue-on-error: true is on ai-review specifically, NOT anywhere in the file
  - "if command -v yq; then test \"$(yq '.jobs.\"ai-review\".\"continue-on-error\"' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" = 'true'; else awk '/^  ai-review:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -q 'continue-on-error: true'; fi  # scoped to ai-review block; bare grep (which passes if any step has the flag) is NOT acceptable"
  - "if command -v yq; then test \"$(yq '.jobs.lint.\"continue-on-error\" // \"false\"' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" != 'true' && test \"$(yq '.jobs.\"unit-tests\".\"continue-on-error\" // \"false\"' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" != 'true' && test \"$(yq '.jobs.contract.\"continue-on-error\" // \"false\"' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" != 'true' && test \"$(yq '.jobs.\"sandbox-verify\".\"continue-on-error\" // \"false\"' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" != 'true'; else echo 'yq not installed; manual review required'; fi  # blocking jobs MUST NOT have continue-on-error (P1-12 â€” was 'deploy-sandbox' in earlier draft; canonical name is 'sandbox-verify' because the PoC step is synth-only, not a real deploy)"
  # €” AWS_DEFAULT_REGION must be set at job level on every job that imports the fork's Python service code (boto3 module-level singleton in tools/aws/dynamodb/__init__.py:9 raises NoRegionError without it)
  - "if command -v yq; then test \"$(yq '.jobs.\"unit-tests\".env.AWS_DEFAULT_REGION' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" = 'us-east-1' && test \"$(yq '.jobs.pbt.env.AWS_DEFAULT_REGION' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" = 'us-east-1' && test \"$(yq '.jobs.contract.env.AWS_DEFAULT_REGION' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" = 'us-east-1'; else awk '/^  unit-tests:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -q 'AWS_DEFAULT_REGION: us-east-1'; fi  # boto3 module-level resource() raises NoRegionError without the env"
  - "grep -q 'gh pr comment' packages/framework/test/fixtures/expected-pr-pipeline.yml  # Q triggered via comment, not action"
  - "! grep -q 'amazon-q-developer/' packages/framework/test/fixtures/expected-pr-pipeline.yml  # no fictional action ref"
  # ai-review job MUST declare permissions for `gh pr comment` to work â€” without these the GITHUB_TOKEN is read-only and the comment step returns 403, rendering Q integration silently broken
  - |
    if command -v yq >/dev/null; then
      test "$(yq '.jobs."ai-review".permissions."pull-requests"' packages/framework/test/fixtures/expected-pr-pipeline.yml)" = "write" \
        || { echo "ERROR: ai-review job missing 'permissions.pull-requests: write' â€” gh pr comment will return 403" >&2; exit 1; }
      test "$(yq '.jobs."ai-review".permissions."issues"' packages/framework/test/fixtures/expected-pr-pipeline.yml)" = "write" \
        || { echo "ERROR: ai-review job missing 'permissions.issues: write' â€” required for some comment-API paths" >&2; exit 1; }
      test "$(yq '.jobs."ai-review".permissions.contents' packages/framework/test/fixtures/expected-pr-pipeline.yml)" = "read" \
        || { echo "ERROR: ai-review job missing 'permissions.contents: read'" >&2; exit 1; }
    else
      awk '/^  ai-review:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -qE 'pull-requests:\s*write' \
        || { echo "ERROR: ai-review job missing pull-requests: write permission" >&2; exit 1; }
    fi
  # ai-review gated on AMAZON_Q_REVIEW_ENABLED variable (not just App installation â€” the variable is the consumer's explicit opt-in)
  - "grep -qE 'AMAZON_Q_REVIEW_ENABLED' packages/framework/test/fixtures/expected-pr-pipeline.yml  # gating variable referenced"
  # €” gated by BOTH (conjunction), not OR (alternation); use yq for structured assertion
  - "if command -v yq; then test \"$(yq '.jobs.\"sandbox-verify\".needs | contains([\"work-id-pr-title\"]) and contains([\"cdk-synth\"])' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" = 'true'; else awk '/^  sandbox-verify:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -q 'work-id-pr-title' && awk '/^  sandbox-verify:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -q 'cdk-synth'; fi  # both must be present"
  - "grep -qE '^\\s*sandbox-verify:' packages/framework/test/fixtures/expected-pr-pipeline.yml  # synth-only sandbox verification job (not a real cdk deploy)"
  - "! grep -qE 'aws-actions/configure-aws-credentials' packages/framework/test/fixtures/expected-pr-pipeline.yml  # PR pipeline does NOT configure AWS creds at PoC fidelity (synth-only)"
  # P0-1 AWS_DEFAULT_REGION on jobs that import production code that touches boto3
  - "grep -qE 'AWS_DEFAULT_REGION:\\s*us-east-1' packages/framework/test/fixtures/expected-pr-pipeline.yml  # boto3 module-import singleton requires region; fork's tools/aws/dynamodb/__init__.py creates resource at import time"
  - "for job in unit-tests pbt contract cdk-synth sandbox-verify; do awk \"/^  ${job}:/,/^  [a-zA-Z]/\" packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -qE 'AWS_DEFAULT_REGION' || { echo \"ERROR: ${job} job missing AWS_DEFAULT_REGION env\"; exit 1; }; done"
  - "if command -v yq; then test \"$(yq '.jobs.\"ai-review\".needs | contains([\"contract\"])' packages/framework/test/fixtures/expected-pr-pipeline.yml)\" = 'true'; else awk '/^  ai-review:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -qE 'needs:.*contract'; fi  # Q runs early (after contract), not after sandbox-verify"
  # dora-emit always runs (terminal). Use yq for cross-line YAML traversal â€” the previous regex `dora-emit:[^}]*if:[^}]*always` does NOT span newlines under default grep, producing a false positive when fields are on separate lines
  - |
    if command -v yq >/dev/null; then
      test "$(yq '.jobs."dora-emit".if' packages/framework/test/fixtures/expected-pr-pipeline.yml)" = "always()" \
        || { echo "ERROR: dora-emit job must have 'if: always()' so the event emits even on upstream failure" >&2; exit 1; }
    else
      awk '/^  dora-emit:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-pr-pipeline.yml | grep -qE 'if:\s*always\(\)' \
        || { echo "ERROR: dora-emit job must have if: always()" >&2; exit 1; }
    fi
  # PR pipeline emits event_type=pipeline_run; integration pipeline emits event_type=deployment with commit_authored_at
  - "grep -qE 'event_type.*pipeline_run' packages/framework/test/fixtures/expected-pr-pipeline.yml  # PR pipeline emits pipeline_run events"
  - "grep -qE 'event_type.*deployment' packages/framework/test/fixtures/expected-integration-pipeline.yml  # integration pipeline emits deployment events (NOT pipeline_run â€” that would break GP-013 MTTR/Lead-Time computations which only consume deployment events)"
  - "grep -qE 'commit_authored_at' packages/framework/test/fixtures/expected-integration-pipeline.yml  # deployment events MUST carry commit_authored_at per GP-001 conditional schema requirement (used downstream for Lead Time)"
  - "grep -qE 'event_id' packages/framework/test/fixtures/expected-pr-pipeline.yml && grep -qE 'event_id' packages/framework/test/fixtures/expected-integration-pipeline.yml  # both pipelines emit event_id (UUIDv7) per GP-001 â€” the stable identity MTTR aggregator joins on"
  - "grep -q 'actions/attest-build-provenance' packages/framework/test/fixtures/expected-integration-pipeline.yml"
  # Build job exists and is referenced by attest â€” closes the 'attestation without build job' attack
  - "grep -qE '^\\s*build:' packages/framework/test/fixtures/expected-integration-pipeline.yml  # build job is declared"
  - "grep -qE 'actions/upload-artifact' packages/framework/test/fixtures/expected-integration-pipeline.yml  # build job uploads an artifact"
  - "if command -v yq; then test \"$(yq '.jobs.attest.needs | .[]' packages/framework/test/fixtures/expected-integration-pipeline.yml | grep -c '^build$')\" -ge 1; else awk '/^  attest:/,/^  [a-zA-Z]/' packages/framework/test/fixtures/expected-integration-pipeline.yml | grep -qE 'needs:.*build'; fi  # attest needs build"
  # Cross-import enforcement: framework reads from generated manifest, not hardcoded
  - "test -f packages/framework/src/generated/check-manifest.json  # codegened from GP-004 source"
  - "uv run python -m dx.checks.manifest_codegen --out packages/framework/src/generated/check-manifest.json && git diff --exit-code packages/framework/src/generated/check-manifest.json  # codegen is idempotent and committed"

demo_signal: "Show the generated PR workflow file: Q step is right where it should be (after determ checks, non-blocking). Show integration workflow: attestation step is the audit-trail evidence. The whole 'AI throughput vs rework' tese visible in 30 seconds of YAML."

notes: |
  The fixtures are golden files. If the generator changes intentionally, regenerate
  the fixture and commit alongside. The fixture is what the demo shows; agents can't
  tweak it without breaking the visual story.

  Amazon Q reality check: Amazon Q Developer for GitHub is a GitHub App (preview),
  not a reusable Action. It auto-reviews new/reopened PRs and responds to '/q review'
  comments. The workflow integration here is to POST '/q review' as a comment via
  `gh pr comment` when AMAZON_Q_REVIEW_ENABLED=true. The actual review arrives async
  from the App. The workflow does not wait for it. Any earlier draft suggesting
  `uses: amazon-q-developer/...@v1` was incorrect (no such action) and would fail at
  runtime.
  Source: https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/github-code-reviews.html

  Cross-import enforcement: this ticket OWNS the test that asserts the framework's
  workflow generator reads check commands from CHECK_MANIFEST (defined in GP-004).
  This is where Design Principle 2 ("Local checks must predict CI") gets teeth.
