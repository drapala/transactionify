id: GP-009c
title: "Dogfood governance — apply ruleset + CODEOWNERS + PR template on the fork"
tier: A
delegate: hybrid
delegate_reason: "Live API calls against the fork. Author reviews before applying so the ruleset doesn't accidentally lock author out of merging."
review_mode: pre_pr_review
blast_radius: medium
stretch: false

depends_on:
  - GP-008
  - GP-009a   # workflow must exist before ruleset derives required_status_checks from it

paths:
  primary: .github/CODEOWNERS
  secondary:
    - .dx.yaml  # may be updated to reference governance config
    - docs/GOVERNANCE.md  # short doc explaining what's enforced
  test:
    - tests/integration/test_governance_applied.py

gherkin:
  - scenario: "CODEOWNERS routes platform-package changes to the platform owner"
    given:
      - "the fork has packages/cli, packages/framework, packages/shared-schemas"
    when:
      - "the CODEOWNERS file is inspected"
    then:
      - "lines exist mapping packages/* → @<author> (or a placeholder team name)"
      - "lines map docs/ADR-*.md → @<author>"
      - "default catch-all is present"

  - scenario: "dx governance apply succeeds on the fork"
    given:
      - "GH_TOKEN with admin permissions on the fork"
      - "GP-008's command is installed"
    when:
      - "dx governance apply --json runs at fork root"
    then:
      - "stdout JSON.status is 'created' or 'updated'"
      - "exit code is 0"

  - scenario: "Ruleset is observable via gh CLI"
    given:
      - "governance has been applied"
    when:
      - "gh ruleset list --repo {owner}/{repo} runs"
    then:
      - "stdout includes a ruleset named 'golden-path-default'"
      - "gh ruleset view <id> shows: required reviewers >= 2, required status checks for the workflow contexts, no force push. Signed-commits enforcement is intentionally NOT in the default ruleset — including it would block solo-author merge without GPG/SSH signing pre-configured; signed-commits is documented as evolution path in the README §Roadmap."

  - scenario: "A PR opened against main respects the ruleset"
    given:
      - "an open PR with a single approval"
    when:
      - "merge is attempted via gh pr merge"
    then:
      - "merge is rejected by GitHub with a 'required reviews not satisfied' message"
      - "this proves enforcement is real, not documented"

out_of_scope:
  - "Multiple environment rulesets (sandbox / staging / prod variants)"
  - "Drift detection between desired and applied ruleset state"
  - "CODEOWNERS auto-generation from contributor history"
  - "Branch-specific rules beyond main"

validation_commands:
  - "test -f .github/CODEOWNERS && grep -qE 'packages/' .github/CODEOWNERS"
  - "test -f docs/GOVERNANCE.md && grep -qE 'golden-path-default' docs/GOVERNANCE.md"
  - "uv run dx governance apply --dry-run --repo owner/repo --json | jq -e '.request_body.rules | length >= 4'"
  # File-level + dry-run validations above can run anywhere. The validations
  # below need live GitHub state (origin pushed to a candidate-controlled
  # fork; gh authed with admin scope; Amazon Q App installed; AMAZON_Q_REVIEW_ENABLED=true).
  # Each one is `skip-loud`: precondition check determines `REPO`; if any
  # precondition fails, the validation echoes a SKIP line and exits 0
  # rather than failing CI. Run these manually before the live demo with
  # `bash -e` to surface real failures.
  - |
    set -e
    ORIGIN_URL="$(git remote get-url origin 2>/dev/null || true)"
    if [ -z "$ORIGIN_URL" ]; then
      echo "SKIP: no origin remote configured (run 'git remote add origin <your-fork-url>')."
      exit 0
    fi
    case "$ORIGIN_URL" in
      *rrgarciach/transactionify*)
        echo "SKIP: origin is upstream (rrgarciach/transactionify); push to a fork before running governance dispatch."
        exit 0
        ;;
    esac
    REPO_FROM_ORIGIN="$(echo "$ORIGIN_URL" | sed -E 's#.*[:/]([^/]+/[^/]+)(\.git)?$#\1#' | sed 's/\.git$//')"
    test -n "$REPO_FROM_ORIGIN" || { echo "SKIP: could not parse owner/repo from origin URL: $ORIGIN_URL"; exit 0; }
    REPO="$REPO_FROM_ORIGIN"
    if ! command -v gh >/dev/null 2>&1; then
      echo "SKIP: gh CLI not on PATH; remote validations cannot run."
      exit 0
    fi
    if ! gh auth status >/dev/null 2>&1; then
      echo "SKIP: gh CLI not authenticated (run 'gh auth login')."
      exit 0
    fi
    echo "REPO=$REPO" > /tmp/gp009c-repo.env
    echo "remote validations will use REPO=$REPO"
  # Default branch must be `main` (rulesets reference refs/heads/main; tickets assume main throughout). SKIP-loud when preconditions in #4 above didn't yield a REPO.
  - |
    [ -f /tmp/gp009c-repo.env ] || { echo "SKIP: preconditions not met (see prior SKIP)."; exit 0; }
    . /tmp/gp009c-repo.env
    DEFAULT_BRANCH="$(gh api "/repos/$REPO" --jq '.default_branch' 2>/dev/null)" || { echo "SKIP: gh api unreachable"; exit 0; }
    test "$DEFAULT_BRANCH" = "main" || { echo "ERROR: default branch on $REPO is '$DEFAULT_BRANCH', must be 'main'." >&2; exit 1; }
  - |
    [ -f /tmp/gp009c-repo.env ] || { echo "SKIP"; exit 0; }
    . /tmp/gp009c-repo.env
    gh ruleset list --repo "$REPO" --json id,name 2>/dev/null | jq -e '.[] | select(.name == "golden-path-default")' >/dev/null \
      || echo "INFO: golden-path-default not yet applied on $REPO (run dx governance apply first)"
  # Amazon Q App installation — owner-type-aware preflight (P0-5). Skip when REPO unset.
  - |
    [ -f /tmp/gp009c-repo.env ] || { echo "SKIP"; exit 0; }
    . /tmp/gp009c-repo.env
    OWNER="${REPO%%/*}"
    OWNER_KIND="$(gh api "/users/$OWNER" --jq '.type' 2>/dev/null)"
    case "$OWNER_KIND" in
      Organization)
        ENDPOINT="/orgs/$OWNER/installations"
        ;;
      User)
        AUTH_LOGIN="$(gh api /user --jq '.login' 2>/dev/null)"
        if [ "$AUTH_LOGIN" = "$OWNER" ]; then
          ENDPOINT="/user/installations"
        else
          echo "ERROR: cannot list App installations for user $OWNER (only the authenticated user can list their own installations via /user/installations). Switch gh auth to $OWNER (e.g. gh auth login -u $OWNER) or run preflight from the fork owner's account." >&2
          exit 1
        fi
        ;;
      *)
        echo "ERROR: could not determine owner type for $OWNER (gh api /users/$OWNER returned no .type — verify the owner exists and gh is authenticated)." >&2
        exit 1
        ;;
    esac
    gh api "$ENDPOINT" --jq '.installations[].app_slug' 2>/dev/null | grep -qE 'amazon-q' \
      || echo "INFO: Amazon Q App not installed on $OWNER. Install at https://github.com/apps/amazon-q-developer before the live demo (ai-review step will no-op without it)."
  # admin permission preflight — skip when REPO unset
  - |
    [ -f /tmp/gp009c-repo.env ] || { echo "SKIP"; exit 0; }
    . /tmp/gp009c-repo.env
    gh api "/repos/$REPO" --jq '.permissions.admin' 2>/dev/null | grep -qE 'true' \
      || echo "INFO: current gh user lacks admin permission on $REPO. dx governance apply will fail at runtime."
  # AMAZON_Q_REVIEW_ENABLED preflight — skip when REPO unset
  - |
    [ -f /tmp/gp009c-repo.env ] || { echo "SKIP"; exit 0; }
    . /tmp/gp009c-repo.env
    Q_VAR="$(gh variable list --repo "$REPO" --json name,value 2>/dev/null | jq -r '.[] | select(.name=="AMAZON_Q_REVIEW_ENABLED") | .value')"
    test "$Q_VAR" = "true" \
      || echo "INFO: AMAZON_Q_REVIEW_ENABLED is not 'true' on $REPO. The ai-review step will no-op silently. Set: gh variable set AMAZON_Q_REVIEW_ENABLED --repo $REPO --body true"
  # Per-repo App access verification (P0-5). Owner-level install does not
  # guarantee per-repo access when the installation scope is 'selected'.
  # Skip when REPO unset.
  - |
    [ -f /tmp/gp009c-repo.env ] || { echo "SKIP"; exit 0; }
    . /tmp/gp009c-repo.env
    OWNER_KIND_2="$(gh api "/users/${REPO%%/*}" --jq '.type' 2>/dev/null)"
    if [ "$OWNER_KIND_2" = "Organization" ]; then
      INSTALL_ENDPOINT="/orgs/${REPO%%/*}/installations"
    else
      INSTALL_ENDPOINT="/user/installations"
    fi
    Q_INSTALLATION_ID="$(gh api "$INSTALL_ENDPOINT" --jq '.installations[] | select(.app_slug | contains("amazon-q")) | .id' 2>/dev/null)"
    if [ -z "$Q_INSTALLATION_ID" ]; then
      echo "INFO: Amazon Q App not installed at owner level — skipping per-repo access check."
      exit 0
    fi
    Q_SELECTION="$(gh api "$INSTALL_ENDPOINT" --jq ".installations[] | select(.id==$Q_INSTALLATION_ID) | .repository_selection")"
    if [ "$Q_SELECTION" = "selected" ]; then
      gh api "/user/installations/$Q_INSTALLATION_ID/repositories" --jq '.repositories[].full_name' 2>/dev/null | grep -qxF "$REPO" \
        || echo "INFO: Q App scoped to 'selected' repos and $REPO is not in the list. Grant per-repo access via the App's installation settings."
    fi

demo_signal: "Live in Act 1: `dx governance apply` → `gh ruleset list` proves two-reviewer is codified, not configured by hand. Platform applies its own rules to itself."

notes: |
  Have a dry-run + sanity check before invoking apply against the fork — easy to lock
  the author out by mistake.

  Two-reviewer enforcement during the live demo: do NOT disable the ruleset (that
  would invalidate the very thing being demonstrated). Use a pre-approved PR — open
  the PR ahead of time, get a second-reviewer approval (collaborator account or
  trusted reviewer), and demonstrate the merge step on that PR. If a second reviewer
  is unavailable, narrate the protected merge state at demo time without attempting
  merge ('in production this PR waits for a second reviewer').

  Required-checks list comes from the regenerated workflow, not from a hardcoded list
  (see GP-008 notes). The blocking jobs at apply time are: lint, unit-tests, pbt,
  contract, work-id-pr-title, cdk-synth, sandbox-verify (P1-12 — canonical name from
  GP-007; the synth-only sandbox step is named sandbox-verify, not deploy-sandbox,
  because at PoC fidelity it does not deploy anything). ai-review is excluded
  (continue-on-error: true) and dora-emit is excluded (if: always()).

  Demo reliability: also verify Amazon Q App installation as part of the apply step's
  dry-run output. The endpoint to use depends on the owner type — `/orgs/{org}/installations`
  for organizational owners, `/user/installations` for the authenticated user (only when
  auth user matches the owner; there is NO `/users/{user}/installations` endpoint for
  arbitrary users in the GitHub REST API). The previous draft used `/repos/{owner}/{repo}/installations`
  which returns HTTP 404 (verified — endpoint does not exist), making the preflight
  always exit non-zero regardless of installation state. P0-5 fix uses owner-type
  detection via `/users/{owner}` → `.type`, then routes to the correct list endpoint.
  If the App is not installed, the workflow's `gh pr comment /q review` step will
  silently no-op; this is a demo-flake risk surfaced here rather than swallowed.

  Signed commits intentionally NOT in the default ruleset (P0-7):
    The candidate is solo and does not have GPG/SSH commit signing pre-configured.
    Including `commit_signature` in the ruleset would block the candidate's own demo
    PR from merging even with two reviewers satisfied — invalidating the very
    enforcement being demonstrated. The ADR Future Integrations section documents
    signed-commits as the next maturity step (requires per-developer key onboarding
    + verification flow); it is NOT a default for this PoC. GP-008 owns the actual
    rule list; this ticket consumes it.
