demo_signal: "ADR + README + DEMO are the entrance. CTO opens README first; the narrative makes the rest of the artifacts legible. Zero LLM-flavored prose."

notes: |
  This ticket is the only one delegate: hand. The reason is durable: AI-flavored ADR/README is the failure mode that loses Staff-level interviews even when the implementation is good.

  Concrete process for the author:
    1. Write ADR-0001.md first (1.5h max). Use ammunition.md §0 (Design Principles, Industry References) as a scaffold; rewrite in own voice. Do NOT copy the ammunition's theoretical sections — those are reasoning, not narrative.
    2. Export to PDF via pandoc or browser print-to-PDF. Verify it fits in 2 pages; tighten prose if not.
       Example: pandoc docs/ADR-0001-architecture.md -o docs/ADR-0001-architecture.pdf --pdf-engine=xelatex -V geometry:margin=1in
    3. Write README second (45m). Install + demo + the production-form callout + Working-with-AI-agents pointer to .kiro/steering/.
    4. Write DEMO.md third (1h, including dry-run). Time each act. Demo MUST use Git-direct install commands (uv tool install git+...; pnpm add git+...) not editable links — PDF requires the install path that an external team would use.
    5. Hand-write .kiro/steering/golden-path.md: project conventions, dx commands, Work ID format, the 4 Design Principles. Short and dense (1 page).
    6. CONTRIBUTING.md (30m). Short.
    7. Demo scripts (1h): preflight + 3 acts + reset, mirroring DEMO.md exactly. Public surface only. No magic retry. Capture expected-output JSONs from a successful local run.
    8. After all written: invoke pre-pr-review on the docs PR. Findings are reviewer feedback, not author replacement.
    9. Record Loom backup AFTER demo dry-run is solid, BEFORE submission.

  Demo reliability philosophy:
    The scripts exist to reduce operational risk during the live walkthrough — they
    do NOT replace DEMO.md. If the CTO interrupts and asks 'do it by hand', the
    author runs the same commands manually from DEMO.md. If the environment flakes,
    the author narrates from expected-output/ snapshots and the Loom backup.

    The scripts must use ONLY public commands (dx init, dx check, dx branch, dx pr,
    dx local up, gh, docker, curl). No calls to internal modules. No `|| true` to
    hide failures. The validation grep checks enforce both rules.

    Two acts + closing only. Resist the temptation to add 'alternative paths' or
    'happy path B' or to bring back the live HTTP curl from a previous draft.
    The 5-minute window does not survive scenario branching, and the live curl
    through FastAPI/uvicorn/boto3-endpoint-switch was the demo's highest flake
    surface — cut to LocalStack scan + narration.

    Two operational hazards in Act 2 — handled by design:
      1. Amazon Q is an async GitHub App. The workflow TRIGGERS '/q review' via
         `gh pr comment`; the App responds whenever it responds. Live demo MUST NOT
         wait for Q. Show the trigger step + the response if it happens to arrive,
         otherwise narrate from demo/expected-output/q-review-comment.json.
      2. The 2-reviewer ruleset applied by GP-009c blocks self-merge by the author.
         For the demo: open a pre-approved PR (collaborator account approves ahead
         of demo time) — this is the PREFERRED path because it demonstrates the
         working merge through the protection, not around it. If a second reviewer
         is unavailable, narrate the protected state ('in production this would
         wait for a second reviewer') without attempting merge. NEVER disable the
         ruleset and NEVER use admin bypass — both invalidate the very thing being
         demonstrated. If the CTO presses on bypass, the answer is 'the platform
         only governs if the author respects it; bypass = author is the breach'.

  PDF deliverables traceability (for self-check before submission):
    - "brief PDF file (max 2 pages)"          → docs/ADR-0001-architecture.pdf
    - "AWS Kiro Evidence (Plus)"              → .kiro/steering/golden-path.md
